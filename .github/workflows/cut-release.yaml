---
name: Cut Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cut-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Reset release to main
        run: |
          git checkout release
          git reset --hard origin/main
          git push --force-with-lease
