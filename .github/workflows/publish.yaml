---
name: Publish

on:
  workflow_run:
    workflows: ["Docker"]
    types: [completed]
    branches: ["main"]
  push:
    branches: ["release"]

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  publish:
    if: >-
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Wait for Go workflow
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "Waiting for Go workflow on ${BRANCH} (${SHA})"
          for i in $(seq 1 30); do
            STATUS=$(gh run list \
              --workflow="go.yaml" \
              --branch="${BRANCH}" \
              --limit=5 \
              --json headSha,conclusion \
              | jq -r ".[] | select(.headSha == \"${SHA}\") | .conclusion" | head -1)
            if [ "$STATUS" = "success" ]; then
              echo "Go workflow: success"
              exit 0
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "cancelled" ]; then
              echo "Go workflow: ${STATUS}, aborting publish"
              exit 1
            fi
            echo "Go workflow: pending (attempt ${i}/30)"
            sleep 10
          done
          echo "Go workflow: timed out"
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22.16.0

      - name: Install semantic-release
        run: npm install -g semantic-release@25.0.3 @semantic-release/git@10.0.1 @semantic-release/changelog@6.0.3 conventional-changelog-conventionalcommits@9.3.1

      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: npx semantic-release
