---
name: Publish

on:
  workflow_run:
    workflows: ["Docker"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  publish:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # Wait for the Go workflow to complete and check its status before proceeding with the publish.
      - name: Wait for Go workflow
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "Waiting for Go workflow on ${BRANCH} (${SHA})"
          for i in $(seq 1 30); do
            STATUS=$(gh run list \
              --workflow="go.yaml" \
              --branch="${BRANCH}" \
              --limit=5 \
              --json headSha,conclusion \
              | jq -r ".[] | select(.headSha == \"${SHA}\") | .conclusion" | head -1)
            if [ "$STATUS" = "success" ]; then
              echo "Go workflow: success"
              exit 0
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "cancelled" ]; then
              echo "Go workflow: ${STATUS}, aborting publish"
              exit 1
            fi
            echo "Go workflow: pending (attempt ${i}/30)"
            sleep 10
          done
          echo "Go workflow: timed out"
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.16.0

      - name: Install semantic-release
        run: npm install -g semantic-release@25.0.3 @semantic-release/git@10.0.1 @semantic-release/changelog@6.0.3 conventional-changelog-conventionalcommits@9.3.1

      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
