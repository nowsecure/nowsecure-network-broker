---
name: Publish

on:
  workflow_run:
    workflows: ["Docker"]
    types: [completed]
    branches: ["main", "release"]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Wait for all workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          for workflow in "Go" "Docker"; do
            echo "Checking workflow: ${workflow}"
            for i in $(seq 1 30); do
              STATUS=$(gh run list \
                --workflow="${workflow}" \
                --branch="${BRANCH}" \
                --json headSha,conclusion \
                --jq ".[] | select(.headSha == \"${SHA}\") | .conclusion" 2>/dev/null | head -1)
              if [ "$STATUS" = "success" ]; then
                echo "  ${workflow}: success"
                break
              elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "cancelled" ]; then
                echo "  ${workflow}: ${STATUS}, aborting publish"
                exit 1
              fi
              echo "  ${workflow}: pending, waiting 10s (attempt ${i}/30)"
              sleep 10
            done
            if [ "$STATUS" != "success" ]; then
              echo "  ${workflow}: timed out waiting"
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.16.0

      - name: Install semantic-release
        run: npm install -g semantic-release@25.0.3 @semantic-release/git@10.0.1 @semantic-release/changelog@6.0.3 conventional-changelog-conventionalcommits@9.3.1

      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
