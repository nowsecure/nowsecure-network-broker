---
name: Release

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]
    branches: ["release"]
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE: nowsecure/nowsecure-network-broker

jobs:
  get-tag:
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Get latest production release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api "repos/${{ github.repository }}/releases?per_page=10" \
            --jq '[.[] | select(.prerelease == false)] | .[0].tag_name // empty')
          if [ -z "$TAG" ]; then
            echo "No production release found, skipping"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

  binaries:
    needs: get-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.get-tag.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: "./go.mod"

      - name: Build binaries
        run: make release
        env:
          GIT_RELEASE_TAG: ${{ needs.get-tag.outputs.tag }}

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.get-tag.outputs.tag }}" release/*

  promote-docker:
    needs: get-tag
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7

      - name: Promote image
        run: |
          TAG="${{ needs.get-tag.outputs.tag }}"
          crane cp "${{ env.IMAGE }}:${TAG}-latest" "${{ env.IMAGE }}:${TAG}"
