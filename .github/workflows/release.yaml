---
name: Release

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]
    branches: ["release"]

permissions:
  contents: write

env:
  IMAGE: nowsecure/nowsecure-network-broker

jobs:
  get-tag:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Get latest production release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api "repos/${{ github.repository }}/releases?per_page=1" \
            --jq '.[0] | select(.prerelease == false) | .tag_name')
          if [ -z "$TAG" ]; then
            echo "No production release found, skipping"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

  binaries:
    needs: get-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.get-tag.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "./go.mod"

      - name: Build binaries
        run: make release
        env:
          GIT_RELEASE_TAG: ${{ needs.get-tag.outputs.tag }}

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.get-tag.outputs.tag }}" release/*

  promote-docker:
    needs: get-tag
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@31b88afe9de28ae0ffa220711af4b60be9435f6e # v0.4

      - name: Promote image
        run: |
          TAG="${{ needs.get-tag.outputs.tag }}"
          crane cp "${{ env.IMAGE }}:${TAG}-latest" "${{ env.IMAGE }}:${TAG}"
