---
name: Release

on:
  release:
    types: [published]

env:
  IMAGE: nowsecure/nowsecure-network-broker

jobs:
  # Build and upload binaries on x.x.x tags
  binaries:
    if: "!contains(github.ref, '-rc.')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "./go.mod"

      - name: Build binaries
        run: make release
        env:
          GIT_RELEASE_TAG: ${{ github.ref_name }}

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" release/*

  # Promote x.x.x-latest Docker image to x.x.x (no rebuild)
  promote-docker:
    if: "!contains(github.ref, '-rc.')"
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@31b88afe9de28ae0ffa220711af4b60be9435f6e # v0.4

      - name: Promote image
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BASE="${TAG%-rc.*}"
          crane cp "${{ env.IMAGE }}:${BASE}-latest" "${{ env.IMAGE }}:${TAG}"
