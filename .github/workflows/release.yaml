---
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  IMAGE: nowsecure/nowsecure-network-broker

jobs:
  binaries:
    if: "!github.event.release.prerelease"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "./go.mod"

      - name: Build binaries
        run: make release
        env:
          GIT_RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" release/*

  promote-docker:
    if: "!github.event.release.prerelease"
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@31b88afe9de28ae0ffa220711af4b60be9435f6e # v0.4

      - name: Promote image
        run: |
          TAG="${{ github.event.release.tag_name }}"
          crane cp "${{ env.IMAGE }}:${TAG}-latest" "${{ env.IMAGE }}:${TAG}"
