---
name: Docker

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  release:
    types: [published]

permissions:
  contents: read

env:
  IMAGE: nowsecure/nowsecure-network-broker
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  # Build only on PR — no push
  build-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Build
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          push: false
          platforms: ${{ env.PLATFORMS }}

  # Build and push stable tag on merge to main
  build-stable:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Login to DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ env.IMAGE }}:stable

  # Build and push x.x.x-latest on RC tag
  build-rc:
    if: github.event_name == 'release' && contains(github.ref, '-rc.')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Login to DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          # e.g. v1.2.3-rc.1 -> v1.2.3
          TAG="${GITHUB_REF#refs/tags/}"
          BASE="${TAG%-rc.*}"
          SHA="$(git rev-parse --short HEAD)"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "rc=${TAG}" >> "$GITHUB_OUTPUT"
          echo "build=${BASE}-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          push: true
          platforms: ${{ env.PLATFORMS }}
          build-args: |
            VERSION=${{ steps.version.outputs.build }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.base }}-latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.rc }}
