---
name: Prerelease

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: read
  id-token: write
  attestations: write
  packages: write

env:
  IMAGE: nowsecure/nowsecure-network-broker
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-release-candidate:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get latest RC tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api "repos/${{ github.repository }}/releases?per_page=1" --jq '.[0].tag_name')
          BASE="${TAG%-rc.*}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "build=${BASE}-${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: true
          platforms: ${{ env.PLATFORMS }}
          build-args: |
            VERSION=${{ steps.tag.outputs.build }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.base }}-latest
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          provenance: mode=max
          sbom: true
