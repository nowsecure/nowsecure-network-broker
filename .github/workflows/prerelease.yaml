---
name: Prerelease

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: read
  id-token: write
  attestations: write
  packages: write

env:
  IMAGE: nowsecure/nowsecure-network-broker
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-release-candidate:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Get latest RC tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== All recent releases ==="
          gh api "repos/${{ github.repository }}/releases?per_page=10" \
            --jq '.[] | "\(.tag_name) prerelease=\(.prerelease) draft=\(.draft)"'
          echo ""
          TAG=$(gh api "repos/${{ github.repository }}/releases?per_page=10" \
            --jq '[.[] | select(.prerelease == true)] | .[0].tag_name // empty')
          echo "Resolved TAG: '${TAG}'"
          if [ -z "$TAG" ]; then
            echo "No RC release found, skipping"
            exit 0
          fi
          echo "Found RC: ${TAG}"
          BASE="${TAG%-rc.*}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "build=${BASE}-${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.tag.outputs.tag
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        if: steps.tag.outputs.tag

      - name: Login to Docker Hub
        if: steps.tag.outputs.tag
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.tag.outputs.tag
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          platforms: ${{ env.PLATFORMS }}
          build-args: |
            VERSION=${{ steps.tag.outputs.build }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.base }}-latest
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          provenance: mode=max
          sbom: true
