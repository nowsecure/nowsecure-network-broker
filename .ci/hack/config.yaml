# Hub URL is the HTTP endpoint of the hub this broker registers with.
# The broker uses this to register itself and receive tunnel configuration.
# This will be provided by NowSecure.
# Required.
hubURL: "https://hub.example.com"

# Logging configuration.
log:
  # Log level. Uses zerolog levels:
  # trace, debug, info, warn, error, fatal, panic
  # Default: info
  level: info

  # Enable human-readable console output instead of JSON logs.
  # Default: false
  pretty: false

# WireGuard tunnel configuration for the connection between broker and hub.
wireguard:
  # Base64-encoded X25519 private key for this broker's WireGuard interface.
  # Generate with: wg genkey
  # Required. Should be provided via a secrets file, not checked into source control.
  privateKey: "oGo7PB3JCu/oBjrFGCVWS0hIijBaFUrh9LW1qdOqCW4="

  # Base64-encoded X25519 public key of the hub this broker connects to.
  # This key will be provided by NowSecure.
  # Required. Should be provided via a secrets file, not checked into source control.
  hubPublicKey: "xTIBA5rboUvnH4htodjb6e697QjLERt1NAB4mZqp8Dg="

  # Maximum Transmission Unit for the WireGuard tunnel.
  # Default: 1420
  mtu: 1420

  # How often to check the WireGuard handshake status to detect disconnection.
  # If no handshake has occurred within 3 minutes, the broker considers the
  # tunnel dead and attempts to re-register.
  # Default: 20s
  heartbeatInterval: 20s

# Proxy configuration defines which customer traffic the broker handles.
proxy:
  # DNS allowlist configuration.
  dns:
    # Customer domains to route through the tunnel.
    # Subdomains are automatically included (e.g. "acme.local" matches "app.acme.local").
    # Both subdomains and exact matches are supported. For example:
    # domains:
    #   - "acme.local"   # matches "app.acme.local", "api.acme.local", etc.
    #   - "app.acme.com" # matches "app.acme.com"
    # The hub enforces FQDN validation: each domain must contain at least one dot
    # and use only valid DNS characters (letters, digits, hyphens).
    # Bare hostnames (e.g. "localhost"), IP addresses, and empty strings are rejected.
    # Required. Must not be empty.
    domains:
      - "acme.local"

    # Hostnames to explicitly deny even if they match a domain above.
    # Note: these are exact matches, not sub domain based.
    # Optional.
    # exclude:
    #   - "internal.acme.local"

  # Ports to proxy traffic on. Default to 80 and 443.
  ports:
    http:
      - 80
    https:
      - 443

# HTTP server configuration for health probes.
server:
  # Enable /healthz and /readyz endpoints. Useful in containerized environments
  # where a liveness and readiness probe are needed.
  # Default: false
  probes: true

  # Address for the health probe HTTP server.
  # Default: 127.0.0.1:8888
  addr: "127.0.0.1:8888"
